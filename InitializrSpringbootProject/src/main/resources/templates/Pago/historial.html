<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <main>
            <section class="container py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>
                        <i class="fas fa-money-check-dollar icon-jade"></i>
                        Historial de Pagos - <span th:text="${miembro.nombre + ' ' + miembro.primerApellido}"></span>
                    </h2>
                    <a class="btn btn-jade" th:href="@{/pago/nuevo/{id}(id=${miembro.idMiembro})}">
                        <i class="fas fa-plus"></i> Registrar Pago
                    </a>
                </div>

                <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>

                <div class="card bg-gris-claro border-0 shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Mes</th>
                                    <th>Año</th>
                                    <th>Fecha de pago</th>
                                    <th>Monto</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pago : ${pagos}">
                                    <td th:text="${pago.mes}"></td>
                                    <td th:text="${pago.anio}"></td>
                                    <td th:text="${pago.fechaPago} ?: 'Sin registrar'"></td>
                                    <td th:text="${'₡' + pago.monto}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${pago.estado.name() == 'PAGADO'} ? 'bg-jade' : 'bg-danger'"
                                              th:text="${pago.estado}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <a class="btn btn-outline-secondary mt-3" th:href="@{/miembro/listado}">
                    <i class="fas fa-arrow-left"></i> Volver a Miembros
                </a>
            </section>
        </main>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
