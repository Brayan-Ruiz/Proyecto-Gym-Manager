<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <main>
            <section class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card bg-gris-claro border-0 shadow-sm">
                            <div class="card-header bg-jade text-white">
                                <h4 class="mb-0">
                                    <i class="fas fa-money-check-dollar"></i>
                                    Registrar Pago - <span th:text="${miembro.nombre + ' ' + miembro.primerApellido}"></span>
                                </h4>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/pago/guardar}" th:object="${pago}" method="post">
                                    <input type="hidden" th:field="*{idMiembro}"/>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Mes</label>
                                            <select th:field="*{mes}" class="form-select" required="true">
                                                <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Año</label>
                                            <input type="number" th:field="*{anio}" class="form-control" required="true"/>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Monto (₡)</label>
                                        <input type="number" step="0.01" th:field="*{monto}" class="form-control" required="true"/>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Estado</label>
                                        <select th:field="*{estado}" class="form-select">
                                            <option value="PAGADO">Pagado</option>
                                            <option value="PENDIENTE">Pendiente</option>
                                        </select>
                                        <div class="form-text">
                                            Si lo marca como "Pagado", el miembro se reactivará automáticamente en caso de estar bloqueado.
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-jade"><i class="fas fa-floppy-disk"></i> Guardar</button>
                                    <a class="btn btn-outline-secondary" th:href="@{/pago/historial/{id}(id=${miembro.idMiembro})}">Cancelar</a>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
