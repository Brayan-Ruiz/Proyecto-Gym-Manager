<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <main>
            <section class="container py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-dumbbell icon-jade"></i> Mis Rutinas</h2>
                    <a class="btn btn-jade" th:href="@{/rutina/nueva}"><i class="fas fa-plus"></i> Nueva Rutina</a>
                </div>

                <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card bg-gris-claro border-0 shadow-sm">
                    <div class="card-body">
                        <p>Total de rutinas creadas: <strong th:text="${totalRutinas}">0</strong></p>
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Fecha de creación</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="rutina : ${rutinas}">
                                    <td th:text="${rutina.nombre}"></td>
                                    <td th:text="${rutina.descripcion}"></td>
                                    <td th:text="${#temporals.format(rutina.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td class="text-end">
                                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/rutina/modificar/{id}(id=${rutina.idRutina})}">
                                            <i class="fas fa-pen"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
