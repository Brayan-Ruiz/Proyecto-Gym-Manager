<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <section class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card card-servicio">
                        <div class="card-header bg-jade text-white">
                            <h4 class="mb-0"><i class="fas fa-right-to-bracket"></i> Iniciar Sesión</h4>
                        </div>
                        <div class="card-body">
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Correo</label>
                                    <input type="email" name="correo" class="form-control" required="true"/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Contraseña</label>
                                    <input type="password" name="contrasena" class="form-control" required="true"/>
                                </div>
                                <button type="submit" class="btn btn-jade w-100">Ingresar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
