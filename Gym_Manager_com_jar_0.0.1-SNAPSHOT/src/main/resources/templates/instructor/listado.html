<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <main>
            <section class="container py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-user-tie icon-jade"></i> Instructores</h2>
                    <a class="btn btn-jade" th:href="@{/instructor/nuevo}"><i class="fas fa-user-plus"></i> Nuevo Instructor</a>
                </div>

                <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card card-servicio">
                    <div class="card-body">
                        <p>Total de instructores: <strong th:text="${totalInstructores}">0</strong></p>
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Nombre completo</th>
                                    <th>Correo</th>
                                    <th>Cédula</th>
                                    <th>N° Contrato</th>
                                    <th>Edad</th>
                                    <th>Estado</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="instructor : ${instructores}">
                                    <td th:text="${instructor.nombre + ' ' + instructor.primerApellido + ' ' + (instructor.segundoApellido ?: '')}"></td>
                                    <td th:text="${instructor.correo}"></td>
                                    <td th:text="${instructor.cedula}"></td>
                                    <td th:text="${instructor.numeroContrato}"></td>
                                    <td th:text="${instructor.edad}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${instructor.estado.name() == 'ACTIVO'} ? 'bg-jade' : 'bg-secondary'"
                                              th:text="${instructor.estado}"></span>
                                    </td>
                                    <td class="text-end">
                                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/instructor/modificar/{id}(id=${instructor.idInstructor})}">
                                            <i class="fas fa-pen"></i>
                                        </a>
                                        <form th:action="@{/instructor/cambiar-estado}" method="post" class="d-inline">
                                            <input type="hidden" name="idInstructor" th:value="${instructor.idInstructor}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Activar/Desactivar">
                                                <i class="fas fa-power-off"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
