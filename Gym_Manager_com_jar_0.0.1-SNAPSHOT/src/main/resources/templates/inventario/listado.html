<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{General/fragmentos :: head}"/>
    <body>
        <header th:replace="~{General/fragmentos :: header}"/>

        <main>
            <section class="container py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-boxes-stacked icon-jade"></i> Inventario</h2>
                    <a class="btn btn-jade" th:href="@{/inventario/nuevo}"><i class="fas fa-plus"></i> Nuevo Artículo</a>
                </div>

                <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- Filtro por categoría (HU-14) -->
                <div class="btn-group mb-3" role="group">
                    <a class="btn btn-outline-secondary" th:classappend="${categoriaSeleccionada == null} ? 'active'" th:href="@{/inventario/listado}">Todos</a>
                    <a class="btn btn-outline-secondary" th:classappend="${categoriaSeleccionada != null and categoriaSeleccionada.name() == 'MAQUINA'} ? 'active'" th:href="@{/inventario/listado(categoria='MAQUINA')}">Máquinas</a>
                    <a class="btn btn-outline-secondary" th:classappend="${categoriaSeleccionada != null and categoriaSeleccionada.name() == 'INDUMENTARIA'} ? 'active'" th:href="@{/inventario/listado(categoria='INDUMENTARIA')}">Indumentaria</a>
                </div>

                <div class="card card-servicio">
                    <div class="card-body">
                        <p>Total de artículos: <strong th:text="${totalArticulos}">0</strong></p>
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Artículo</th>
                                    <th>Categoría</th>
                                    <th>Cantidad</th>
                                    <th>Estado</th>
                                    <th>Descripción</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="articulo : ${articulos}">
                                    <td th:text="${articulo.nombreArticulo}"></td>
                                    <td th:text="${articulo.categoria}"></td>
                                    <td th:text="${articulo.cantidad}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${articulo.estadoConservacion.name() == 'DANADO'} ? 'bg-secondary' : 'bg-jade'"
                                              th:text="${articulo.estadoConservacion}"></span>
                                    </td>
                                    <td th:text="${articulo.descripcion}"></td>
                                    <td class="text-end">
                                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/inventario/modificar/{id}(id=${articulo.idInventario})}">
                                            <i class="fas fa-pen"></i>
                                        </a>
                                        <form th:action="@{/inventario/eliminar}" method="post" class="d-inline"
                                              onsubmit="return confirm('¿Está seguro de eliminar este artículo?');">
                                            <input type="hidden" name="idInventario" th:value="${articulo.idInventario}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <footer th:replace="~{General/fragmentos :: footer}"/>
    </body>
</html>
