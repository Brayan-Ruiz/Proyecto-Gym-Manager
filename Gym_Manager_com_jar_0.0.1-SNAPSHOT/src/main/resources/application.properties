spring.application.name=Gym Manager

server.port=91

logging.pattern.dateformat=dd-MM HH:mm

spring.main.banner-mode=off

spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://localhost:3306/gym_manager

spring.datasource.username=usuario_gym_manager

spring.datasource.password=gym123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.type.descriptor.sql.BasicBinder=TRACE

spring.jpa.hibernate.ddl-auto=update

server.servlet.session.timeout=60m